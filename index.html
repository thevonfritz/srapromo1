<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senhora Promo – Os Melhores Achados da Internet</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%23AF4056'/%3E%3Cpath fill='white' d='M14 18h4l5 20h18l4-14H22'/%3E%3Ccircle cx='26' cy='42' r='3' fill='white'/%3E%3Ccircle cx='38' cy='42' r='3' fill='white'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FAD3D2;
      --pink:      #AF4056;
      --pink-dark: #7B2035;
      --gold:      #FBCA45;
      --text-dark: #3D1020;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      overflow-x: hidden;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════
       HERO
    ══════════════════════════════════ */
    .hero {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      overflow: hidden;
      background: linear-gradient(
        105deg,
        var(--pink-dark)  0%,
        var(--pink)       22%,
        #C87840           45%,
        #D9A060           58%,
        #C87840           72%,
        var(--pink)       88%,
        var(--pink-dark) 100%
      );
    }

    /* ── Camada 1: Grid quadriculado (atrás de tudo) ── */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Camada 2: Imagem de fundo (sobre o grid) ── */
    .hero__bg {
      position: absolute;
      inset: 0;
      background-image: url('img/img1mobile.png');
      background-size: cover;
      background-position: center top;
      z-index: 1;
    }
    @media (min-width: 900px) {
      .hero__bg { background-image: url('img/img1.png'); }
    }

    /* ── Camada 3: Confetti ── */
    .confetti {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }
    .confetti span {
      position: absolute;
      display: block;
      border-radius: 2px;
    }

    /* ── Camada 4: Tags decorativas ── */
    .deco-tag {
      position: absolute;
      z-index: 3;
      font-size: clamp(1.6rem, 4vw, 3rem);
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
      pointer-events: none;
      user-select: none;
    }
    .deco-tag--tl { top: 6%;  left: 3%;  transform: rotate(-15deg); }
    .deco-tag--tr { top: 5%;  right: 4%; transform: rotate(12deg);  }

    /* ── Camada 10: Conteúdo principal ── */
    .hero__body {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: clamp(5rem,14vw,10rem) clamp(1.5rem,5vw,4rem) clamp(1rem,3vw,2rem);
    }

    .col-text {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .hero-logo {
      width: auto;
      height: clamp(60px, 10vw, 120px);
      object-fit: contain;
      display: block;
      align-self: flex-start;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.30));
    }

    .headline {
      display: flex;
      flex-direction: column;
      line-height: 1.05;
    }

    .hl-dark {
      font-family: 'Changa One', sans-serif;
      font-size: clamp(2.2rem, 4.5vw, 5rem);
      color: var(--text-dark);
      letter-spacing: 0.01em;
      text-shadow:
        0 2px 6px rgba(0,0,0,0.30),
        0 4px 18px rgba(0,0,0,0.18);
    }
    .hl-gold {
      font-family: 'Changa One', sans-serif;
      font-size: clamp(2.2rem, 4.5vw, 5rem);
      color: var(--gold);
      letter-spacing: 0.01em;
      text-shadow:
        0 2px 8px rgba(0,0,0,0.35),
        0 4px 22px rgba(0,0,0,0.20);
    }

    /* Botão */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--gold);
      color: var(--text-dark);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: clamp(0.9rem, 1.8vw, 1.1rem);
      text-decoration: none;
      padding: 0.9rem 2rem;
      border-radius: 100px;
      width: fit-content;
      animation: glow-btn 2.4s ease-in-out infinite;
      transition: opacity 0.18s, transform 0.18s;
    }
    .cta-btn:hover { opacity: 0.88; transform: translateY(-2px); }
    .cta-btn svg { width: 22px; height: 22px; flex-shrink: 0; }

    @keyframes glow-btn {
      0%,100% { box-shadow: 0 4px 16px rgba(200,150,40,0.40), 0 0 0 0px  rgba(251,202,69,0.30); }
      50%      { box-shadow: 0 6px 28px rgba(200,150,40,0.65), 0 0 0 10px rgba(251,202,69,0.10); }
    }

    /* ══════════════════════════════════
       CARROSSEL INFINITO
       4 sets idênticos → translateX(-50%)
       → cada metade ≈ 2640px > qualquer tela
    ══════════════════════════════════ */
    .marquee-strip {
      position: relative;
      z-index: 10;
      width: 100%;
      overflow: hidden;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-top:    1px solid rgba(255,255,255,0.25);
      border-bottom: 1px solid rgba(255,255,255,0.25);
      padding: 1rem 0;
    }

    /* Máscara fade nas bordas */
    .marquee-strip::before,
    .marquee-strip::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 100px;
      z-index: 2;
      pointer-events: none;
    }
    .marquee-strip::before {
      left: 0;
      background: linear-gradient(to right, rgba(180,100,55,0.60), transparent);
    }
    .marquee-strip::after {
      right: 0;
      background: linear-gradient(to left, rgba(180,100,55,0.60), transparent);
    }

    .marquee-track {
      display: flex;
      /* SEM gap — espaçamento feito com padding no .logo-item */
      width: max-content;
      animation: marquee-infinite 28s linear infinite;
    }

    /* Pausa ao hover no desktop */
    @media (hover: hover) {
      .marquee-strip:hover .marquee-track { animation-play-state: paused; }
    }

    /*
      4 sets → anima -50% (metade dos 4 sets = 2 sets)
      Seamless: ao voltar para 0, a imagem é idêntica
    */
    @keyframes marquee-infinite {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .logo-item {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 68px;
      /* Espaçamento uniforme — mesmo no ponto de loop */
      padding: 0 2rem;
      flex-shrink: 0;
    }
    .logo-item img {
      height: 100%;
      width: auto;
      max-width: 140px;
      object-fit: contain;
      display: block;
    }

    /* ══════════════════════════════════
       MOBILE < 900px
    ══════════════════════════════════ */
    @media (max-width: 899px) {

      /* Texto centralizado no mobile */
      .hero__body {
        align-items: flex-end;
        justify-content: center;
        padding: 4rem 1.2rem 1rem;
      }

      .col-text {
        align-items: center;
        text-align: center;
        gap: 1.2rem;
        width: 100%;
      }

      .hl-dark,
      .hl-gold { font-size: clamp(2rem, 10vw, 3.2rem); }

      .hero-logo { height: clamp(50px, 14vw, 80px); align-self: center; }

      /* Botão full-width no mobile */
      .cta-btn {
        width: 100%;
        max-width: 340px;
        justify-content: center;
        font-size: 1rem;
        padding: 1rem 1.5rem;
      }

      /* Tags menores */
      .deco-tag { font-size: 1.5rem; }
      .deco-tag--tl { top: 4%; left: 2%; }
      .deco-tag--tr { top: 4%; right: 2%; }

      /* Carrossel maior no mobile também */
      .logo-item { height: 56px; padding: 0 1.4rem; }
      .marquee-strip { padding: 0.85rem 0; }
    }
  </style>
</head>
