<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senhora Promo – Os Melhores Achados da Internet</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%23e91e8c'/%3E%3Cpath fill='white' d='M14 18h4l5 20h18l4-14H22'/%3E%3Ccircle cx='26' cy='42' r='3' fill='white'/%3E%3Ccircle cx='38' cy='42' r='3' fill='white'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #f0c842;
      --gold-dark:  #d4a017;
      --brown-dark: #1a0a04;
      --brown-mid:  #3d1505;
      --pink:       #e91e8c;
    }

    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      background: var(--brown-dark);
      overflow-x: hidden;
    }

    /* ── Grid animado (desktop) ── */
    .hero__grid {
      display: none;
      position: absolute;
      inset: -100px;
      z-index: 0;
      background-image:
        linear-gradient(rgba(240,200,66,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,200,66,0.07) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: grid-drift 18s linear infinite;
      pointer-events: none;
    }
    @keyframes grid-drift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(48px, 48px); }
    }

    @media (min-width: 900px) {
      .hero__grid { display: block; }
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Fundo mobile (padrão) */
    .hero__bg {
      position: absolute;
      inset: 0;
      background-image: url('img/img1mobile.png');
      background-size: cover;
      background-position: center top;
      background-color: var(--brown-mid);
      z-index: 0;
    }

    /* Overlay mobile: escuro em cima e embaixo, transparente no meio */
    .hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,4,1,0.88) 0%,
        rgba(10,4,1,0.50) 25%,
        rgba(10,4,1,0.08) 42%,
        rgba(10,4,1,0.08) 58%,
        rgba(10,4,1,0.60) 75%,
        rgba(10,4,1,0.92) 100%
      );
      z-index: 1;
    }

    /* ── Partículas ── */
    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      opacity: 0;
      animation: float-up var(--dur,4s) ease-in-out var(--delay,0s) infinite;
    }
    @keyframes float-up {
      0%   { opacity: 0;   transform: translateY(0) scale(0.5); }
      20%  { opacity: 0.7; }
      80%  { opacity: 0.2; }
      100% { opacity: 0;   transform: translateY(-80vh) scale(1.3); }
    }

    /* ── MOBILE: bloco do topo ── */
    .hero__top {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: clamp(2.2rem, 10vw, 4rem) 1.5rem 0.5rem;
    }

    /* ── MOBILE: bloco da base ── */
    .hero__bottom {
      position: relative;
      z-index: 10;
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0.5rem 1.5rem clamp(2.2rem, 10vw, 4rem);
      gap: 1.4rem;
    }

    /* ── Rótulo "Sra Promo" ── */
    .hl-label {
      font-family: 'Poppins', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.50);
      margin-bottom: 0.5rem;
    }

    /* ── "Os melhores" ── */
    .hl-white {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2.6rem, 12vw, 4.2rem);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #fff;
      text-shadow: 0 3px 18px rgba(0,0,0,0.7);
      line-height: 1;
    }

    /* ── dourado itálico ── */
    .hl-gold {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2.6rem, 12vw, 4.2rem);
      text-transform: uppercase;
      font-style: italic;
      letter-spacing: 0.03em;
      color: var(--gold);
      text-shadow: 0 3px 28px rgba(212,160,23,0.45);
      line-height: 1;
    }

    /* ── Botão WhatsApp (verde, igual ao original) ── */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1rem, 4vw, 1.2rem);
      letter-spacing: 0.02em;
      text-decoration: none;
      padding: 1.05rem 2.2rem;
      border-radius: 100px;
      white-space: nowrap;
      box-shadow:
        0 0 0 3px rgba(37,211,102,0.35),
        0 8px 32px rgba(18,140,126,0.55);
      animation: glow-btn 2.5s ease-in-out infinite;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .cta-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        0 0 0 7px rgba(37,211,102,0.2),
        0 14px 44px rgba(18,140,126,0.65);
    }
    .cta-btn svg { width: 22px; height: 22px; flex-shrink: 0; }

    @keyframes glow-btn {
      0%, 100% { box-shadow: 0 0 0 3px rgba(37,211,102,0.35), 0 8px 32px rgba(18,140,126,0.55); }
      50%       { box-shadow: 0 0 0 9px rgba(37,211,102,0.12), 0 12px 44px rgba(18,140,126,0.70); }
    }

    /* Wrapper desktop — oculto por padrão (mobile-first) */
    .hero__desktop {
      display: none;
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: clamp(3rem, 8vw, 7rem) clamp(2rem, 7vw, 9rem);
    }

    .hero__desktop .headline {
      display: flex;
      flex-direction: column;
      gap: 0.05em;
      line-height: 1;
    }

    /* ══════════════════════════════════════════
       DESKTOP ≥ 900px
    ══════════════════════════════════════════ */
    @media (min-width: 900px) {

      .hero__bg {
        background-image: url('img/img1.png');
      }

      .hero__overlay {
        background: linear-gradient(
          100deg,
          rgba(15,5,2,0.92) 0%,
          rgba(15,5,2,0.80) 35%,
          rgba(15,5,2,0.30) 65%,
          rgba(15,5,2,0.00) 100%
        );
      }

      .hero {
        justify-content: center;
      }

      .hero__top,
      .hero__bottom { display: none; }

      .hero__desktop {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2rem;
      }

      .hero__desktop .hl-label { font-size: clamp(0.68rem, 0.9vw, 0.82rem); }
      .hero__desktop .hl-white { font-size: clamp(2rem, 4.5vw, 5rem); }
      .hero__desktop .hl-gold  { font-size: clamp(2rem, 4.5vw, 5rem); }
    }
  </style>
</head>

<script>
  const container = document.getElementById('sparkles');
  const colors = ['#f0c842','#e91e8c','#ffffff','#d4a017','#ff4db8'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    const size = 3 + Math.random() * 7;
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:${10 + Math.random()*80}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dur:${3 + Math.random()*5}s;
      --delay:${Math.random()*7}s;
      border-radius:${Math.random()>.4?'50%':'3px'};
    `;
    container.appendChild(el);
  }
</script>
